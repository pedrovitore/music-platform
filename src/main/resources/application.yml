# Server
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
    


# Database - H2 file-based (single file, no server needed)
spring:
  datasource:
    url: jdbc:h2:file:./musicdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    #password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate.ddl-auto: update
    show-sql: false
# H2 Console (optional - http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

# Music folder path - CHANGE THIS TO YOUR PATH
# Windows example:
music:
  folder: F:\Nova pasta\Música\Rock
# Mac/Linux example:
# music.folder=/Users/yourname/Music